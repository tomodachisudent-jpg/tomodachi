version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: be
    container_name: fastapi-backend
    working_dir: /app
    volumes:
      - ./apis:/app/apis
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8000:8000"
    command: uvicorn apis.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - frontend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: fe
    container_name: quasar-frontend
    working_dir: /ui
    volumes:
      - ./ui:/ui
    ports:
      - "9000:9000"
    command: quasar build

  final:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: production-app
    volumes:
    - ./ui/dist/spa:/usr/share/nginx/html
    - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "8088:8088"
    depends_on:
      - backend
      - frontend